version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - model-data:/app/models
      - app-data:/data
    environment:
      - MODEL_PATH=/app/models/house_price_model.pkl
      - DATA_VOLUME_PATH=/data
      - LOG_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

volumes:
  model-data:
  app-data:
